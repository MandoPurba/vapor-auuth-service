apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: app
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: app
  template:
    metadata:
      labels:
        io.kompose.service: app
    spec:
      containers:
        - args:
            - serve
            - --env
            - production
            - --hostname
            - 0.0.0.0
            - --port
            - "8080"
          env:
            - name: DATABASE_HOST
              value: db
            - name: DATABASE_NAME
              value: vapor_database
            - name: DATABASE_PASSWORD
              value: vapor_password
            - name: DATABASE_USERNAME
              value: vapor_username
            - name: JWT_SECRET
              value: dev-secret-change-me
            - name: LOG_LEVEL
              value: debug
          image: auth-service:latest
          name: app
          ports:
            - containerPort: 8080
              protocol: TCP
      restartPolicy: Always
