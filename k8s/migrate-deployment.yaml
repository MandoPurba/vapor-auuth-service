apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: migrate
  name: migrate
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: migrate
  template:
    metadata:
      labels:
        io.kompose.service: migrate
    spec:
      containers:
        - args:
            - migrate
            - --yes
          env:
            - name: DATABASE_HOST
              value: db
            - name: DATABASE_NAME
              value: vapor_database
            - name: DATABASE_PASSWORD
              value: vapor_password
            - name: DATABASE_USERNAME
              value: vapor_username
            - name: JWT_SECRET
              value: dev-secret-change-me
            - name: LOG_LEVEL
              value: debug
          image: auth-service:latest
          name: migrate
      restartPolicy: Always
